<div class="source-panel">
  <header class="source-header">
    <mat-icon>code</mat-icon>
    <span class="header-title">HTML Source</span>
    <button mat-icon-button 
            matTooltip="Close" 
            aria-label="Close source panel"
            class="close-btn"
            (click)="onClose()">
      <mat-icon>close</mat-icon>
    </button>
  </header>

  <div class="source-content">
    @if (showLineNumbers()) {
      <div class="line-numbers" aria-hidden="true" [innerHTML]="lineNumbers()"></div>
    }
    
    <div class="code-area">
      <div class="highlight-layer syntax-highlight" 
           [innerHTML]="highlightedContent()">
      </div>
      
      @if (!readonly()) {
        <textarea 
          class="code-textarea"
          [value]="content()"
          (input)="onContentChange($any($event.target).value)"
          spellcheck="false"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off">
        </textarea>
      }
    </div>
  </div>
</div>
